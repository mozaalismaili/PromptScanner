<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptScanner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="header">
    <div class="header-right">
      <img src="icons/logo.png" alt="logo" class="header-logo-img"
           onerror="this.style.display='none'" />
      <div>
        <div class="logo">Prompt<span>Scanner</span></div>
        <div class="header-sub">فحص الخصوصية والسلامة</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-settings" title="الإعدادات">⚙</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-view" class="view">
    <div class="loading-box">
      <div class="spinner-ring"></div>
      <div class="loading-text">جارٍ الفحص…</div>
    </div>
  </div>

  <!-- Error -->
  <div id="error-view" class="view hidden">
    <div class="error-box">
      <div class="error-icon">✕</div>
      <div class="error-msg" id="error-msg">حدث خطأ في الاتصال بالخادم.</div>
    </div>
    <div class="btn-send-row">
      <button class="btn-send-orig" id="btn-send-anyway">⟶ إرسال على أي حال</button>
      <button class="btn-cancel" id="btn-cancel-error">✕ إلغاء</button>
    </div>
  </div>

  <!-- Results -->
  <div id="result-view" class="view hidden">

    <div class="elapsed-row">
      <span id="elapsed-text"></span>
    </div>

    <div class="section-label">◆ النص المُقنَّع</div>
    <div class="masked-box" id="masked-text"></div>

    <div class="section-label">◆ تحليل السمية</div>
    <div class="tox-card" id="tox-card">
      <div class="tox-top">
        <div class="tox-label" id="tox-label"></div>
        <div class="tox-badge" id="tox-badge"></div>
      </div>
      <div class="tox-conf" id="tox-conf"></div>
      <div class="pbar-bg">
        <div class="pbar-fill" id="pbar-fill"></div>
      </div>
    </div>

    <div id="hl-section" class="hidden">
      <div class="section-label">◆ الكلمات المؤثرة</div>
      <div class="hl-box" id="hl-words"></div>
    </div>

    <div id="rewrite-loading" class="hidden">
      <div class="rewrite-loading-text">
        <span class="dot-anim">●</span>
        <span class="dot-anim">●</span>
        <span class="dot-anim">●</span>
        جارٍ إعادة الصياغة بواسطة Qwen…
      </div>
    </div>

    <div id="rewrite-section" class="hidden">
      <div class="section-label" style="color: var(--teal);">◆ النص المُعاد كتابته</div>
      <div class="rewrite-box" id="rewrite-box"></div>
    </div>

    <div class="btn-row">
      <button class="btn-rewrite hidden" id="btn-rewrite">✦ إعادة الصياغة</button>
      <button class="btn-cancel" id="btn-cancel">✕ إلغاء</button>
    </div>

    <div class="btn-send-row">
      <button class="btn-send-orig" id="btn-send-orig">⟶ إرسال الأصلي</button>
      <button class="btn-send-new hidden" id="btn-send-new">⟶ إرسال المُعاد كتابته</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
